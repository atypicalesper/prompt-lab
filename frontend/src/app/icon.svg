<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background pill -->
  <rect width="32" height="32" rx="8" fill="#0b0d14"/>

  <!-- Stars -->
  <circle cx="5"  cy="5"  r="0.7" fill="#818cf8" opacity="0.8"/>
  <circle cx="27" cy="7"  r="0.5" fill="white"   opacity="0.5"/>
  <circle cx="26" cy="24" r="0.7" fill="#818cf8" opacity="0.6"/>
  <circle cx="7"  cy="26" r="0.5" fill="white"   opacity="0.4"/>
  <circle cx="28" cy="17" r="0.4" fill="white"   opacity="0.35"/>

  <!-- Saturn (small planet, bottom-left) -->
  <circle cx="8" cy="21" r="3.2" fill="#1e1b4b"/>
  <circle cx="8" cy="21" r="3.2" fill="none" stroke="#818cf8" stroke-width="0.9"/>
  <!-- Saturn ring -->
  <ellipse cx="8" cy="21" rx="5.8" ry="1.6"
    fill="none" stroke="#a5b4fc" stroke-width="0.85" opacity="0.85"
    transform="rotate(-20 8 21)"/>

  <!-- Falling astronaut — head -->
  <circle cx="21.5" cy="8.5" r="2.6"
    fill="none" stroke="white" stroke-width="1.1"/>

  <!-- Body / torso (tilted) -->
  <path d="M20 11 Q18.5 15 16.5 17.5"
    fill="none" stroke="white" stroke-width="1.2"
    stroke-linecap="round"/>

  <!-- Left arm (up/out) -->
  <path d="M19.5 12.5 Q23 11 25 12"
    fill="none" stroke="white" stroke-width="1.1"
    stroke-linecap="round"/>

  <!-- Right arm (down) -->
  <path d="M19 14 Q16.5 14.5 15 15.5"
    fill="none" stroke="white" stroke-width="1.1"
    stroke-linecap="round"/>

  <!-- Left leg (up) -->
  <path d="M16.5 17.5 Q15.5 20 14.5 22"
    fill="none" stroke="white" stroke-width="1.1"
    stroke-linecap="round"/>

  <!-- Right leg (bent, higher) -->
  <path d="M16.5 17.5 Q18.5 19 20 20.5"
    fill="none" stroke="white" stroke-width="1.1"
    stroke-linecap="round"/>

  <!-- Tiny orbiting dot -->
  <circle cx="13.5" cy="9" r="1" fill="#818cf8" opacity="0.9"/>
  <circle cx="11"   cy="12" r="0.6" fill="#a5b4fc" opacity="0.7"/>
</svg>
